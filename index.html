<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Omni-Shape Magic with Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    /* Video tetap ada tapi kita buat transparan/samar agar partikel lebih terlihat */
    #video { 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirroring video */
      opacity: 0.6; /* Atur angka ini (0.1 - 1.0) untuk kejelasan kamera */
    }
    canvas { 
      position: absolute; 
      top: 0; 
      left: 0; 
      z-index: 10; 
    }
    .ui {
      position: absolute; top: 20px; left: 20px; color: cyan;
      font-family: sans-serif; z-index: 20; pointer-events: none;
      text-shadow: 2px 2px 4px #000;
    }
  </style>
</head>
<body>
  <div class="ui">Mode: <span id="modeName">Follow</span></div>
  <video id="video" playsinline></video>

  <script>
    let particles = [];
    let handLandmarks = null;
    let lerpX = 0, lerpY = 0;
    let currentMode = 0; 
    const numParticles = 800;

    // --- MEDIAPIPE SETUP ---
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(results => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handLandmarks = results.multiHandLandmarks[0];
        
        let d = dist(handLandmarks[4].x, handLandmarks[4].y, handLandmarks[8].x, handLandmarks[8].y);
        if (d < 0.06) {
            if (currentMode !== 1) setMode(1);
        } else if (currentMode === 1) {
            setMode(0);
        }
      } else {
        handLandmarks = null;
      }
    });

    const camera = new Camera(document.getElementById('video'), {
      onFrame: async () => { await hands.send({image: document.getElementById('video')}); },
      width: 640, height: 480
    });
    camera.start();

    // --- P5.JS ENGINE ---
    function setup() {
      createCanvas(windowWidth, windowHeight);
      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle(i));
      }
    }

    function draw() {
      // Kita hapus canvas setiap frame agar video di bawahnya terlihat jelas
      clear(); 

      if (handLandmarks) {
        let targetX = (1 - handLandmarks[8].x) * width;
        let targetY = handLandmarks[8].y * height;
        lerpX = lerp(lerpX, targetX, 0.2);
        lerpY = lerp(lerpY, targetY, 0.2);

        particles.forEach(p => {
          p.behaviors(lerpX, lerpY);
          p.update();
          p.show();
        });
      } else {
        particles.forEach(p => {
          p.wander();
          p.update();
          p.show();
        });
      }
    }

    function setMode(m) {
        currentMode = m;
        let names = ["Follow", "Heart", "Square", "Circle"];
        document.getElementById('modeName').innerText = names[m];
    }

    function mousePressed() {
        currentMode = (currentMode + 1) % 4;
        setMode(currentMode);
    }

    class Particle {
      constructor(index) {
        this.index = index;
        this.pos = createVector(random(width), random(height));
        this.vel = p5.Vector.random2D();
        this.acc = createVector(0, 0);
        this.maxSpeed = 10;
        this.maxForce = 0.6;
        this.color = color(255);
      }

      behaviors(tx, ty) {
        let target;
        if (currentMode === 1) {
            target = this.getHeartTarget(tx, ty);
            this.color = color(255, 50, 150);
        } else if (currentMode === 2) {
            target = this.getSquareTarget(tx, ty);
            this.color = color(50, 255, 150);
        } else if (currentMode === 3) {
            target = this.getCircleTarget(tx, ty);
            this.color = color(50, 200, 255);
        } else {
            target = createVector(tx, ty);
            this.color = color(255, 255, 255);
        }

        let steer = this.arrive(target);
        this.acc.add(steer);
      }

      getHeartTarget(tx, ty) {
        let angle = map(this.index, 0, numParticles, 0, TWO_PI);
        let r = 14;
        let x = tx + r * 16 * pow(sin(angle), 3);
        let y = ty - r * (13 * cos(angle) - 5 * cos(2 * angle) - 2 * cos(3 * angle) - cos(4 * angle));
        return createVector(x, y);
      }

      getSquareTarget(tx, ty) {
        let s = 300; let p = numParticles/4; let i = this.index;
        if (i < p) return createVector(tx - s/2 + (i/p)*s, ty - s/2);
        if (i < p*2) return createVector(tx + s/2, ty - s/2 + ((i-p)/p)*s);
        if (i < p*3) return createVector(tx + s/2 - ((i-p*2)/p)*s, ty + s/2);
        return createVector(tx - s/2, ty + s/2 - ((i-p*3)/p)*s);
      }

      getCircleTarget(tx, ty) {
        let angle = map(this.index, 0, numParticles, 0, TWO_PI);
        return createVector(tx + cos(angle)*180, ty + sin(angle)*180);
      }

      arrive(target) {
        let d = p5.Vector.sub(target, this.pos);
        let speed = (d.mag() < 100) ? map(d.mag(), 0, 100, 0, this.maxSpeed) : this.maxSpeed;
        return p5.Vector.sub(d.setMag(speed), this.vel).limit(this.maxForce);
      }

      update() {
        this.vel.add(this.acc).limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.96);
      }

      show() {
        stroke(this.color);
        strokeWeight(4);
        point(this.pos.x, this.pos.y);
      }

      wander() {
        this.acc.add(p5.Vector.random2D().mult(0.3));
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
