<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ultra-Responsive Magic</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
    #video { position: fixed; transform: scaleX(-1); opacity: 0.3; width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; z-index: 10; }
    .debug {
      position: absolute; top: 10px; right: 10px; color: #0f0; 
      font-family: monospace; font-size: 10px; z-index: 20; text-align: right;
    }
  </style>
</head>
<body>
  <div class="debug">
    FPS: <span id="fps">0</span><br>
    MODE: <span id="mStatus">OFF</span><br>
    COUNT: <span id="pCount">0</span>
  </div>
  <video id="video" playsinline></video>

  <script>
    let particles = [];
    let isFollowActive = false;
    let lastToggleTime = 0;
    let rawTarget = { x: 0, y: 0 };
    let smoothTarget = { x: 0, y: 0 };
    let handInFrame = false;

    // --- 1. OPTIMASI DETEKSI (MEDIA PIPE) ---
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0, // 0 lebih cepat untuk HP daripada 1
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(results => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handInFrame = true;
        const lm = results.multiHandLandmarks[0];
        
        // Deteksi Thumbs Up (Jempol) untuk Toggle
        let isThumbUp = lm[4].y < lm[3].y && lm[4].y < lm[2].y && lm[8].y > lm[6].y;
        if (isThumbUp && Date.now() - lastToggleTime > 600) {
          isFollowActive = !isFollowActive;
          lastToggleTime = Date.now();
          document.getElementById('mStatus').innerText = isFollowActive ? "FOLLOW" : "IDLE";
        }

        // Simpan koordinat mentah (Telunjuk)
        rawTarget.x = (1 - lm[8].x) * width;
        rawTarget.y = lm[8].y * height;
      } else {
        handInFrame = false;
      }
    });

    const camera = new Camera(document.getElementById('video'), {
      onFrame: async () => { await hands.send({image: document.getElementById('video')}); },
      width: 480, height: 360 // Resolusi lebih kecil = Respon lebih instan
    });
    camera.start();

    // --- 2. OPTIMASI ANIMASI (P5.JS) ---
    function setup() {
      createCanvas(windowWidth, windowHeight);
      // Gunakan jumlah partikel yang pas untuk HP agar FPS tidak drop
      for (let i = 0; i < 600; i++) {
        particles.push(new Particle());
      }
      document.getElementById('pCount').innerText = particles.length;
      frameRate(60); // Paksa ke 60 FPS
    }

    function draw() {
      clear();
      document.getElementById('fps').innerText = floor(frameRate());

      // LERP untuk "Smooth Target" (Menghilangkan getaran tangan)
      smoothTarget.x = lerp(smoothTarget.x, rawTarget.x, 0.25);
      smoothTarget.y = lerp(smoothTarget.y, rawTarget.y, 0.25);

      particles.forEach(p => {
        if (isFollowActive && handInFrame) {
          p.applyPhysics(smoothTarget.x, smoothTarget.y, true);
        } else {
          p.applyPhysics(0, 0, false);
        }
        p.update();
        p.show();
      });
    }

    class Particle {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.vel = p5.Vector.random2D();
        this.acc = createVector();
        this.maxSpeed = random(5, 12); // Speed ditingkatkan agar respon terasa cepat
        this.maxForce = 0.8; 
        this.noiseOffset = random(1000);
      }

      applyPhysics(tx, ty, following) {
        if (following) {
          let target = createVector(tx, ty);
          let steer = p5.Vector.sub(target, this.pos);
          let d = steer.mag();
          
          // Arrive behavior yang lebih agresif
          let speed = map(d, 0, 200, 0, this.maxSpeed);
          steer.setMag(speed);
          
          let force = p5.Vector.sub(steer, this.vel);
          force.limit(this.maxForce);
          this.acc.add(force);
        } else {
          // Gerakan mengalir saat idle
          let n = noise(this.noiseOffset + frameCount * 0.01);
          let angle = map(n, 0, 1, 0, TWO_PI * 4);
          this.acc.add(p5.Vector.fromAngle(angle).mult(0.1));
        }
      }

      update() {
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.95); // Friction
      }

      show() {
        stroke(0, 255, 255, 180);
        strokeWeight(3);
        point(this.pos.x, this.pos.y);
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
